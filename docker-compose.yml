services:
  api:
    build: .
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_DIR=/app/storage

  worker:
    build: .
    command: celery -A worker.celery_app:celery_app worker --beat --loglevel=info
    env_file: .env
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_DIR=/app/storage

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

volumes:
  redis-data:
