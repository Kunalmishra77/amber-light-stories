name: Security regression

# The M1-M15 audit found that earlier "tenant isolation" tests ran through the
# SERVICE ROLE, which bypasses RLS — so they proved nothing, and two critical
# privilege escalations survived three security epics. This suite signs in as
# REAL users and asserts through their JWTs. It is a required gate: any P0/P1
# regression fails the build — BUT only once the CI secrets are configured.
#
# Until an owner adds the SUPABASE_TEST_* secrets (repo → Settings → Secrets and
# variables → Actions), this workflow SKIPS gracefully and passes green, so it
# never spams "run failed" emails. It activates automatically the moment the
# secrets exist. Point them at a NON-PRODUCTION Supabase project — the suite
# creates and deletes users and tenants.

# Deliberately NOT triggered on every push to main: a solo owner deploys by
# pushing, and a heavy CI run (or one failing on absent secrets) would email
# "run failed" on every deploy. It runs on pull requests and can be started
# manually from the Actions tab (workflow_dispatch).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # These tests create and delete live fixtures; never run two at once.
  group: security-regression
  cancel-in-progress: false

jobs:
  security:
    name: Tenant isolation & privilege boundaries
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check for CI secrets
        id: guard
        env:
          URL: ${{ secrets.SUPABASE_TEST_URL }}
          ANON: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
          SERVICE: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "$URL" ] && [ -n "$ANON" ] && [ -n "$SERVICE" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "CI secrets present — running the real-JWT security suite."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Security suite SKIPPED — add SUPABASE_TEST_URL, SUPABASE_TEST_ANON_KEY and SUPABASE_TEST_SERVICE_ROLE_KEY (point them at a NON-PRODUCTION Supabase project) to enable it."
          fi

      - name: Install web dependencies
        if: steps.guard.outputs.configured == 'true'
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Run the security regression suite
        if: steps.guard.outputs.configured == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
        run: |
          node --experimental-strip-types \
               --import ./tests/security/loader.mjs \
               ./tests/security/security-regression.test.ts

      - name: Structural verification (RLS, privileges, immutability)
        if: ${{ steps.guard.outputs.configured == 'true' && secrets.SUPABASE_TEST_DB_URL != '' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_TEST_DB_URL }}
        run: |
          python -m pip install --quiet psycopg2-binary
          python scripts/verify_recovery.py

      - name: Remove test fixtures
        if: ${{ always() && steps.guard.outputs.configured == 'true' && secrets.SUPABASE_TEST_DB_URL != '' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_TEST_DB_URL }}
        run: |
          python -m pip install --quiet psycopg2-binary
          python scripts/cleanup_test_fixtures.py

      - name: Confirm no fixtures were left behind
        if: ${{ always() && steps.guard.outputs.configured == 'true' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
        run: node tests/security/assert-clean.mjs

  typecheck-build:
    name: Typecheck & production build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        working-directory: web
        run: node node_modules/typescript/bin/tsc --noEmit

      - name: Production build
        working-directory: web
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          # Build-time values only; the build must not need real credentials.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY || 'placeholder' }}
        run: npm run build
